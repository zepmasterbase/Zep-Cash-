<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zep Cash (ZAC) — Presale</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Poppins&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#00f0ff;
  --violet:#9c4dff;
  --bg:radial-gradient(circle at 30% 10%, #050018, #00000c);
  --glass:rgba(255,255,255,0.08);
  --text-light:rgba(255,255,255,.85);
}

*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins,sans-serif;}

body{
  min-height:100vh;
  background:var(--bg);
  color:white;
  overflow-x:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
}

header{
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 24px;
}

.logo{
  font-family:Orbitron;
  font-size:28px;
  background:linear-gradient(90deg,var(--blue),var(--violet));
  -webkit-background-clip:text;
  color:transparent;
}

nav a{
  color:white;
  margin-left:20px;
  text-decoration:none;
  font-weight:500;
  transition:.3s;
}

nav a:hover{
  color:var(--blue);
}

.main{
  width:100%;
  max-width:1200px;
  padding:40px 24px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:30px;
}

.card{
  width:100%;
  max-width:500px;
  background:var(--glass);
  border-radius:20px;
  padding:28px;
  box-shadow:0 0 30px rgba(0,240,255,.25),0 0 60px rgba(156,77,255,.25);
  animation:pulse 2.5s infinite alternate;
}

@keyframes pulse{
  0%{box-shadow:0 0 20px rgba(0,240,255,.25),0 0 40px rgba(156,77,255,.25);}
  50%{box-shadow:0 0 30px rgba(0,240,255,.35),0 0 60px rgba(156,77,255,.35);}
  100%{box-shadow:0 0 20px rgba(0,240,255,.25),0 0 40px rgba(156,77,255,.25);}
}

h1,h2{
  font-family:Orbitron;
  text-align:center;
  background:linear-gradient(90deg,var(--blue),var(--violet));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:999px;
  font-family:Orbitron;
  background:linear-gradient(90deg,var(--blue),var(--violet));
  color:#050015;
  cursor:pointer;
  font-weight:600;
  transition:.3s;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 0 20px var(--blue),0 0 40px var(--violet);
}

.stats{
  display:flex;
  justify-content:space-between;
  margin-top:20px;
}

.stat{
  flex:1;
  margin:0 10px;
  padding:20px;
  border-radius:20px;
  background:var(--glass);
  text-align:center;
  box-shadow:0 0 20px rgba(0,240,255,.2),0 0 40px rgba(156,77,255,.2);
  animation:pulse 3s infinite alternate;
}

footer{
  width:100%;
  padding:20px;
  text-align:center;
  color:var(--text-light);
}

@media(max-width:768px){
  .stats{
    flex-direction:column;
    gap:20px;
  }
}

</style>
</head>
<body>

<header>
  <div class="logo">Zep Cash</div>
  <nav>
    <a href="about.html">About</a>
    <a href="roadmap.html">Roadmap</a>
  </nav>
</header>

<div class="main">

  <div class="card">
    <h1>Join the Zep Cash Presale</h1>
    <p style="text-align:center;">Connect your Base/Metamask wallet to buy ZAC with USDC</p>
    <button onclick="connectWallet()">Connect Wallet / Buy Now</button>
  </div>

  <div class="stats">
    <div class="stat">
      <h2 id="sold">0 ZAC</h2>
      <p>Sold</p>
    </div>
    <div class="stat">
      <h2 id="remaining">500,000,000 ZAC</h2>
      <p>Remaining</p>
    </div>
    <div class="stat">
      <h2 id="price">$0.00025</h2>
      <p>Presale Price</p>
    </div>
  </div>

  <div class="card">
    <h2>Presale Countdown</h2>
    <p id="countdown" style="text-align:center;font-size:20px;"></p>
  </div>

</div>

<footer>
  🚀 Powered by Zep Cash | Base Network
</footer>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>
<script>
// ======== Wallet & Countdown ========
let provider, signer, userAddress;

async function connectWallet(){
  if(window.ethereum){
    provider = new ethers.providers.Web3Provider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    signer = provider.getSigner();
    userAddress = await signer.getAddress();
    alert("Wallet connected: "+userAddress);
    // redirect to presale page
    window.location.href="presale.html";
  } else {
    alert("Install MetaMask or Base wallet!");
  }
}

// ======= Presale countdown =======
const presaleEnd = new Date();
presaleEnd.setDate(presaleEnd.getDate() + 10); // 10 days countdown
function updateCountdown(){
  const now = new Date();
  let diff = presaleEnd - now;
  if(diff<0) diff=0;
  const d=Math.floor(diff/(1000*60*60*24));
  const h=Math.floor(diff/(1000*60*60)%24);
  const m=Math.floor(diff/(1000*60)%60);
  const s=Math.floor(diff/1000%60);
  document.getElementById("countdown").innerText=`${d}d ${h}h ${m}m ${s}s`;
}
setInterval(updateCountdown,1000);
updateCountdown();

</script>

</body>
</html>
